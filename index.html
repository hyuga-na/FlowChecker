<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowChecker</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;

      --ok-bg: #ecfdf5;
      --ok-text: #065f46;

      --jump-bg: #fff7ed;
      --jump-text: #9a3412;

      --lack-bg: #eff6ff;
      --lack-text: #1d4ed8;

      --undef-bg: #f5f3ff;
      --undef-text: #6d28d9;

      --over-bg: #fef2f2;
      --over-text: #991b1b;

      --wait-bg: #f3f4f6;
      --wait-text: #374151;

      --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.6;
    }

    .notice {
      background: #fff7ed;
      color: #9a3412;
      border: 1px solid #fdba74;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 20px;
      line-height: 1.6;
      font-size: 14px;
    }

    .status-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: white;
      border: 1px solid var(--border);
      font-size: 14px;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #9ca3af;
    }

    .dot.ready { background: #10b981; }
    .dot.loading { background: #f59e0b; }
    .dot.error { background: #ef4444; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .panel h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .field textarea {
      width: 100%;
      min-height: 76px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      line-height: 1.6;
      background: #fff;
      color: var(--text);
    }

    .field textarea:focus {
      outline: none;
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s ease;
    }

    button.primary {
      background: var(--accent);
      color: white;
    }

    button.secondary {
      background: #eef2ff;
      color: #3730a3;
    }

    button.ghost {
      background: #f3f4f6;
      color: #374151;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .results {
      display: grid;
      gap: 12px;
    }

    .result-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .result-title {
      font-weight: 700;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.problem-none {
      background: var(--ok-bg);
      color: var(--ok-text);
    }

    .badge.jump {
      background: var(--jump-bg);
      color: var(--jump-text);
    }

    .badge.lack {
      background: var(--lack-bg);
      color: var(--lack-text);
    }

    .badge.undefined {
      background: var(--undef-bg);
      color: var(--undef-text);
    }

    .badge.excess {
      background: var(--over-bg);
      color: var(--over-text);
    }

    .badge.wait {
      background: var(--wait-bg);
      color: var(--wait-text);
    }

    .section-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin: 12px 0 6px;
      letter-spacing: 0.02em;
    }

    .pair, .reason, .score {
      font-size: 14px;
      color: var(--text);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .meta {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .footer-note {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    .progress-wrap {
      margin-top: 10px;
    }

    .progress-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: #e5e7eb;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.2s ease;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>FlowChecker</h1>
    <p class="subtitle">
      5行の研究ロジックを入力し、各行が直前の行から自然につながっているかを
      ブラウザ内モデルで判定します。
    </p>

    <div class="notice">
      初回のみモデル読み込みに時間がかかります。<br>
      WebGPU が利用可能なら自動で優先し、使えない場合は CPU で実行します。
    </div>

    <div class="status-bar">
      <div class="chip">
        <span id="model-dot" class="dot"></span>
        <span id="model-status">モデル未ロード</span>
      </div>
      <div class="chip">
        <span id="device-dot" class="dot"></span>
        <span id="device-status">推論デバイス未決定</span>
      </div>
      <div class="chip">
        <span id="progress-text">待機中</span>
      </div>
    </div>

    <div class="layout">
      <section class="panel">
        <h2>入力</h2>

        <div class="field">
          <label for="l1">1. 背景</label>
          <textarea id="l1"></textarea>
        </div>

        <div class="field">
          <label for="l2">2. 課題</label>
          <textarea id="l2"></textarea>
        </div>

        <div class="field">
          <label for="l3">3. 解法</label>
          <textarea id="l3"></textarea>
        </div>

        <div class="field">
          <label for="l4">4. 結果</label>
          <textarea id="l4"></textarea>
        </div>

        <div class="field">
          <label for="l5">5. 考察</label>
          <textarea id="l5"></textarea>
        </div>

        <div class="buttons">
          <button id="load-btn" class="secondary">モデルを読み込む</button>
          <button id="check-btn" class="primary" disabled>チェック</button>
          <button id="clear-btn" class="ghost">クリア</button>
        </div>

        <div class="progress-wrap">
          <div class="progress-label">モデル読み込み状況</div>
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </div>

        <div class="footer-note">
          判定ラベルは「問題なし / 飛躍 / 不足 / 未定義 / 過剰」です。<br>
          1行目は比較対象がないため固定で「問題なし」です。
        </div>
      </section>

      <section class="panel">
        <h2>結果</h2>
        <div id="results" class="results"></div>
        <div class="footer-note">
          2〜5行目はそれぞれ 1→2, 2→3, 3→4, 4→5 の接続を判定します。
        </div>
      </section>
    </div>
  </div>

  <script type="module">
    import { pipeline } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.8.0";

    const MODEL_ID = "Xenova/mDeBERTa-v3-base-xnli-multilingual-nli-2mil7";
    const LINE_NAMES = ["背景", "課題", "解法", "結果", "考察"];
    const LABELS = ["問題なし", "飛躍", "不足", "未定義", "過剰"];

    let classifier = null;
    let selectedDevice = "wasm";
    let isLoading = false;
    let isChecking = false;

    const els = {
      loadBtn: document.getElementById("load-btn"),
      checkBtn: document.getElementById("check-btn"),
      clearBtn: document.getElementById("clear-btn"),
      modelStatus: document.getElementById("model-status"),
      modelDot: document.getElementById("model-dot"),
      deviceStatus: document.getElementById("device-status"),
      deviceDot: document.getElementById("device-dot"),
      progressText: document.getElementById("progress-text"),
      progressFill: document.getElementById("progress-fill"),
      results: document.getElementById("results"),
      l1: document.getElementById("l1"),
      l2: document.getElementById("l2"),
      l3: document.getElementById("l3"),
      l4: document.getElementById("l4"),
      l5: document.getElementById("l5"),
    };

    function supportsWebGPU() {
      return typeof navigator !== "undefined" && "gpu" in navigator;
    }

    function setModelState(state, text) {
      els.modelStatus.textContent = text;
      els.modelDot.className = "dot " + state;
    }

    function setDeviceState(state, text) {
      els.deviceStatus.textContent = text;
      els.deviceDot.className = "dot " + state;
    }

    function setProgress(text, percent = null) {
      els.progressText.textContent = text;
      if (percent === null || Number.isNaN(percent)) {
        els.progressFill.style.width = "0%";
      } else {
        const p = Math.max(0, Math.min(100, percent));
        els.progressFill.style.width = p + "%";
      }
    }

    function getLines() {
      return [
        els.l1.value.trim(),
        els.l2.value.trim(),
        els.l3.value.trim(),
        els.l4.value.trim(),
        els.l5.value.trim(),
      ];
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function badgeClass(label) {
      switch (label) {
        case "問題なし": return "problem-none";
        case "飛躍": return "jump";
        case "不足": return "lack";
        case "未定義": return "undefined";
        case "過剰": return "excess";
        default: return "wait";
      }
    }

    function relationName(index) {
      if (index === 0) return "比較対象なし";
      return `${LINE_NAMES[index - 1]} → ${LINE_NAMES[index]}`;
    }

    function lineSpecificReason(label, prevRole, currRole, prevText, currText) {
      if (!prevText && currRole) {
        return `前の行が空欄のため、${currRole}への接続を評価できません。`;
      }
      if (!currText && currRole) {
        return `${currRole}が空欄のため、論理接続が成立していません。`;
      }

      const transition = `${prevRole}から${currRole}への接続`;

      switch (label) {
        case "問題なし":
          return `${transition}は自然です。直前の内容から次の主張が無理なく導かれています。`;
        case "飛躍":
          return `${transition}に中間説明が不足しています。前の行から次の主張へ移る論理の橋渡しが弱いです。`;
        case "不足":
          return `${currRole}を支えるための情報が${prevRole}に十分含まれていません。前提や条件の補足が必要です。`;
        case "未定義":
          return `${currRole}で使われている概念・対象・手法の一部が、それ以前の行で導入されていません。`;
        case "過剰":
          return `${currRole}の主張が${prevRole}に対して強すぎます。直前の内容からはそこまで言い切れません。`;
        default:
          return "判定中です。";
      }
    }

    function buildPrompt(prevLabel, currLabel, prevText, currText) {
      return [
        `前の行の役割: ${prevLabel}`,
        `次の行の役割: ${currLabel}`,
        `前の文: ${prevText}`,
        `次の文: ${currText}`,
        "",
        "前の行から次の行への研究ロジック上の接続を判定する。",
        "使用可能なラベルは次の5つのみ。",
        "問題なし: 自然につながっている。",
        "飛躍: 中間説明がなく、論理の橋渡しが弱い。",
        "不足: 次の行を支える前提情報が足りない。",
        "未定義: 次の行で使う概念や対象が未導入である。",
        "過剰: 次の行の主張が強すぎる。",
        "",
        "この接続に最も適切なラベルを1つ選ぶ。"
      ].join("\n");
    }

    function getHeuristicFeatures(prevText, currText) {
      const prev = prevText || "";
      const curr = currText || "";

      const feature = {
        overlap: 0,
        hasMethodWord: false,
        hasResultWord: false,
        hasDiscussionWord: false,
        hasAbstractRef: false,
        introducesNewTerms: false,
        strongClaim: false,
      };

      const splitWords = (text) =>
        text
          .split(/[\s、。，．。・()（）「」『』【】\[\],.!?！？:：;；/]+/)
          .map(s => s.trim())
          .filter(s => s.length >= 2);

      const prevWords = splitWords(prev);
      const currWords = splitWords(curr);

      const prevSet = new Set(prevWords);
      const currSet = new Set(currWords);

      let overlap = 0;
      for (const w of currSet) {
        if (prevSet.has(w)) overlap++;
      }
      feature.overlap = overlap;

      const methodWords = ["提案", "手法", "モデル", "学習", "推定", "分類", "生成", "FiLM", "手順", "設計"];
      const resultWords = ["結果", "性能", "向上", "改善", "精度", "有意", "実験", "評価", "達成"];
      const discussionWords = ["有効", "示唆", "考えられる", "可能性", "解釈", "意味", "有用"];
      const abstractRefs = ["これ", "それ", "この", "その", "両者", "提案手法", "本手法", "本研究"];
      const strongClaims = ["証明", "完全", "必ず", "明らか", "万能", "決定的", "全て", "十分である", "有効である"];

      feature.hasMethodWord = methodWords.some(w => curr.includes(w));
      feature.hasResultWord = resultWords.some(w => curr.includes(w));
      feature.hasDiscussionWord = discussionWords.some(w => curr.includes(w));
      feature.hasAbstractRef = abstractRefs.some(w => curr.includes(w));

      const newTerms = currWords.filter(w => !prevSet.has(w) && w.length >= 3);
      feature.introducesNewTerms = newTerms.length >= 2;

      feature.strongClaim = strongClaims.some(w => curr.includes(w));

      return feature;
    }

    function heuristicClassify(prevText, currText, prevIndex, currIndex) {
      if (currIndex === 0) {
        return { label: "問題なし", scoreText: "固定判定" };
      }
      if (!prevText && !currText) {
        return { label: "不足", scoreText: "両方空欄" };
      }
      if (!prevText) {
        return { label: "不足", scoreText: "前行空欄" };
      }
      if (!currText) {
        return { label: "不足", scoreText: "当該行空欄" };
      }

      const f = getHeuristicFeatures(prevText, currText);
      let label = "問題なし";

      if (currIndex === 1) {
        if (f.introducesNewTerms && !f.hasAbstractRef) label = "未定義";
        else if (f.strongClaim) label = "過剰";
        else if (f.overlap === 0) label = "飛躍";
      } else if (currIndex === 2) {
        if (f.introducesNewTerms && f.hasMethodWord && f.overlap === 0) label = "未定義";
        else if (f.overlap === 0) label = "飛躍";
        else if (!f.hasMethodWord) label = "不足";
      } else if (currIndex === 3) {
        if (f.strongClaim) label = "過剰";
        else if (!f.hasResultWord) label = "不足";
        else if (f.overlap === 0) label = "飛躍";
      } else if (currIndex === 4) {
        if (f.strongClaim) label = "過剰";
        else if (f.introducesNewTerms && !f.hasAbstractRef) label = "未定義";
        else if (!f.hasDiscussionWord && f.overlap === 0) label = "飛躍";
      }

      return {
        label,
        scoreText: `overlap=${f.overlap}, method=${f.hasMethodWord}, result=${f.hasResultWord}, discussion=${f.hasDiscussionWord}, newTerms=${f.introducesNewTerms}, strongClaim=${f.strongClaim}`
      };
    }

    function renderInitialResults() {
      const lines = getLines();

      const cards = [];
      for (let i = 0; i < 5; i++) {
        const label = i === 0 ? "問題なし" : "未判定";
        const reason = i === 0
          ? "1行目は比較対象がないため固定で問題なしです。"
          : "まだ判定していません。";

        const prev = i === 0 ? "" : lines[i - 1];
        const curr = lines[i];

        cards.push(`
          <div class="result-card">
            <div class="result-head">
              <div class="result-title">${i + 1}行目（${LINE_NAMES[i]}）</div>
              <span class="badge ${badgeClass(label)}">${label}</span>
            </div>

            <div class="section-label">接続</div>
            <div class="pair">${escapeHtml(relationName(i))}</div>

            <div class="section-label">内容</div>
            <div class="pair">${escapeHtml(
              i === 0
                ? `当該行: ${curr || "（未入力）"}`
                : `前: ${prev || "（未入力）"}\n次: ${curr || "（未入力）"}`
            )}</div>

            <div class="section-label">理由</div>
            <div class="reason">${escapeHtml(reason)}</div>

            <div class="section-label">補足</div>
            <div class="meta">未判定</div>
          </div>
        `);
      }

      els.results.innerHTML = cards.join("");
    }

    function renderResult(index, label, relation, prev, curr, reason, scoreText) {
      const cards = Array.from(els.results.children);
      const card = cards[index];
      if (!card) return;

      card.innerHTML = `
        <div class="result-head">
          <div class="result-title">${index + 1}行目（${LINE_NAMES[index]}）</div>
          <span class="badge ${badgeClass(label)}">${label}</span>
        </div>

        <div class="section-label">接続</div>
        <div class="pair">${escapeHtml(relation)}</div>

        <div class="section-label">内容</div>
        <div class="pair">${escapeHtml(
          index === 0
            ? `当該行: ${curr || "（未入力）"}`
            : `前: ${prev || "（未入力）"}\n次: ${curr || "（未入力）"}`
        )}</div>

        <div class="section-label">理由</div>
        <div class="reason">${escapeHtml(reason)}</div>

        <div class="section-label">補足</div>
        <div class="meta">${escapeHtml(scoreText || "なし")}</div>
      `;
    }

    async function loadModel() {
      if (classifier || isLoading) return;

      isLoading = true;
      els.loadBtn.disabled = true;
      els.checkBtn.disabled = true;

      selectedDevice = supportsWebGPU() ? "webgpu" : "wasm";
      setDeviceState("loading", selectedDevice === "webgpu" ? "WebGPU を試行中" : "CPU (WASM) を使用");
      setModelState("loading", "モデル読込中");
      setProgress("モデルを読み込んでいます...", 0);

      try {
        classifier = await pipeline("zero-shot-classification", MODEL_ID, {
          device: selectedDevice,
          dtype: selectedDevice === "webgpu" ? "fp16" : "q8",
          progress_callback: (progress) => {
            if (!progress) return;
            const p = progress.progress ?? 0;
            const status = progress.status ?? "loading";
            setProgress(`読込中: ${status}`, p * 100);
          },
        });

        setModelState("ready", "モデル読込完了");
        setDeviceState("ready", selectedDevice === "webgpu" ? "WebGPU で実行" : "CPU (WASM) で実行");
        setProgress("準備完了", 100);
        els.checkBtn.disabled = false;
      } catch (e) {
        console.warn("WebGPU load failed, fallback to WASM:", e);

        try {
          selectedDevice = "wasm";
          setDeviceState("loading", "CPU (WASM) に切替中");
          setProgress("CPU モードで再読込中...", 10);

          classifier = await pipeline("zero-shot-classification", MODEL_ID, {
            device: "wasm",
            dtype: "q8",
            progress_callback: (progress) => {
              if (!progress) return;
              const p = progress.progress ?? 0;
              const status = progress.status ?? "loading";
              setProgress(`読込中: ${status}`, p * 100);
            },
          });

          setModelState("ready", "モデル読込完了");
          setDeviceState("ready", "CPU (WASM) で実行");
          setProgress("準備完了", 100);
          els.checkBtn.disabled = false;
        } catch (err) {
          console.error(err);
          setModelState("error", "モデル読込失敗");
          setDeviceState("error", "推論デバイス初期化失敗");
          setProgress("読込に失敗しました", 0);
          alert("モデルの読み込みに失敗しました。通信環境かブラウザ設定を確認してください。");
        }
      } finally {
        isLoading = false;
        els.loadBtn.disabled = false;
      }
    }

    async function classifyPair(prevIndex, currIndex, prevText, currText) {
      const relation = `${LINE_NAMES[prevIndex]} → ${LINE_NAMES[currIndex]}`;

      if (!prevText || !currText) {
        const fallback = heuristicClassify(prevText, currText, prevIndex, currIndex);
        return {
          label: fallback.label,
          reason: lineSpecificReason(fallback.label, LINE_NAMES[prevIndex], LINE_NAMES[currIndex], prevText, currText),
          relation,
          scoreText: `fallback: ${fallback.scoreText}`
        };
      }

      if (!classifier) {
        const fallback = heuristicClassify(prevText, currText, prevIndex, currIndex);
        return {
          label: fallback.label,
          reason: lineSpecificReason(fallback.label, LINE_NAMES[prevIndex], LINE_NAMES[currIndex], prevText, currText),
          relation,
          scoreText: `fallback: ${fallback.scoreText}`
        };
      }

      const sequence = buildPrompt(
        LINE_NAMES[prevIndex],
        LINE_NAMES[currIndex],
        prevText,
        currText
      );

      try {
        const output = await classifier(sequence, LABELS, {
          multi_label: false,
          hypothesis_template: "この接続の判定は {}。"
        });

        const labels = Array.isArray(output.labels) ? output.labels : [];
        const scores = Array.isArray(output.scores) ? output.scores : [];
        const topLabel = labels[0] || "飛躍";
        const topScore = typeof scores[0] === "number" ? scores[0] : null;

        return {
          label: LABELS.includes(topLabel) ? topLabel : "飛躍",
          reason: lineSpecificReason(
            LABELS.includes(topLabel) ? topLabel : "飛躍",
            LINE_NAMES[prevIndex],
            LINE_NAMES[currIndex],
            prevText,
            currText
          ),
          relation,
          scoreText: topScore === null
            ? "model score unavailable"
            : `model score=${topScore.toFixed(3)}`
        };
      } catch (e) {
        console.warn("classification failed, using fallback:", e);

        const fallback = heuristicClassify(prevText, currText, prevIndex, currIndex);
        return {
          label: fallback.label,
          reason: lineSpecificReason(fallback.label, LINE_NAMES[prevIndex], LINE_NAMES[currIndex], prevText, currText),
          relation,
          scoreText: `fallback after error: ${fallback.scoreText}`
        };
      }
    }

    async function checkLogic() {
      if (isChecking) return;
      isChecking = true;

      if (!classifier) {
        const go = confirm("まだモデルが読み込まれていません。先に読み込みます。");
        if (!go) {
          isChecking = false;
          return;
        }
        await loadModel();
        if (!classifier) {
          isChecking = false;
          return;
        }
      }

      els.checkBtn.disabled = true;
      els.loadBtn.disabled = true;
      setProgress("判定中...", null);

      const lines = getLines();
      renderInitialResults();

      renderResult(
        0,
        "問題なし",
        "比較対象なし",
        "",
        lines[0],
        "1行目は比較対象がないため固定で問題なしです。",
        "固定判定"
      );

      for (let i = 1; i < 5; i++) {
        renderResult(
          i,
          "判定中",
          relationName(i),
          lines[i - 1],
          lines[i],
          "判定中です。",
          "処理待機中"
        );
      }

      try {
        for (let i = 1; i < 5; i++) {
          setProgress(`${i}/4 件目を判定中...`, (i / 4) * 100);
          const result = await classifyPair(i - 1, i, lines[i - 1], lines[i]);
          renderResult(i, result.label, result.relation, lines[i - 1], lines[i], result.reason, result.scoreText);
        }
        setProgress("判定完了", 100);
      } finally {
        els.checkBtn.disabled = false;
        els.loadBtn.disabled = false;
        isChecking = false;
      }
    }

    function clearAll() {
      els.l1.value = "";
      els.l2.value = "";
      els.l3.value = "";
      els.l4.value = "";
      els.l5.value = "";
      renderInitialResults();
      setProgress(classifier ? "準備完了" : "待機中", classifier ? 100 : 0);
    }

    els.loadBtn.addEventListener("click", loadModel);
    els.checkBtn.addEventListener("click", checkLogic);
    els.clearBtn.addEventListener("click", clearAll);

    renderInitialResults();

    if (supportsWebGPU()) {
      setDeviceState("ready", "WebGPU 利用可能");
    } else {
      setDeviceState("ready", "WebGPU 非対応 / CPU (WASM) 想定");
    }
    setModelState("ready", "未ロード");
    setProgress("待機中", 0);
  </script>
</body>
</html>
