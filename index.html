<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowChecker Fractal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <h1>FlowChecker Fractal</h1>
    <p class="subtitle">
      5行ロジックを再帰的に分解しながら記述し、各ブロックごとに論理接続を判定します。
    </p>

    <div class="notice">
      各行はさらに5行へ分解できます。判定理由は右側の一覧にまとめて表示されます。
    </div>

    <div class="status-bar">
      <div class="chip">
        <span id="model-dot" class="dot"></span>
        <span id="model-status">モデル未ロード</span>
      </div>
      <div class="chip">
        <span id="device-dot" class="dot"></span>
        <span id="device-status">推論デバイス未決定</span>
      </div>
      <div class="chip">
        <span id="progress-text">待機中</span>
      </div>
    </div>

    <div class="top-buttons">
      <button id="load-btn" class="secondary">モデルを読み込む</button>
      <button id="analyze-root-btn" class="primary" disabled>ルートブロックを判定</button>
      <button id="analyze-all-btn" class="primary" disabled>全ブロックを判定</button>
      <button id="copy-md-btn" class="ghost">Markdownをコピー</button>
      <button id="clear-btn" class="ghost">全体をクリア</button>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">処理状況</div>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </div>

    <div class="main-layout">
      <div id="tree-root" class="tree-root"></div>

      <aside class="reasons-panel">
        <div class="reasons-header">
          <h2>判定理由一覧</h2>
        </div>
        <div id="reasons-root" class="reasons-root"></div>
      </aside>
    </div>

    <div class="footer-note">
      各ブロックの右端には、そのブロック内の5行の判定ラベルだけを表示します。
      詳細な理由は右側の一覧で確認してください。
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
