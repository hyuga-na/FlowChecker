<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>FlowChecker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      margin-bottom: 10px;
    }
    .container {
      display: flex;
      gap: 20px;
    }
    .input, .output {
      background: white;
      padding: 15px;
      border-radius: 8px;
      width: 50%;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    textarea {
      width: 100%;
      height: 60px;
      margin-bottom: 10px;
      resize: vertical;
    }
    button {
      margin-right: 10px;
      padding: 8px 16px;
      cursor: pointer;
    }
    .result {
      margin-bottom: 10px;
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }
    .ok {
      color: green;
    }
    .bad {
      color: red;
    }
  </style>
</head>
<body>

<h1>FlowChecker</h1>
<p>5行で論理の流れをチェック</p>

<div class="container">

  <div class="input">
    <h3>入力</h3>

    <label>背景</label>
    <textarea id="l1"></textarea>

    <label>課題</label>
    <textarea id="l2"></textarea>

    <label>解法</label>
    <textarea id="l3"></textarea>

    <label>結果</label>
    <textarea id="l4"></textarea>

    <label>考察</label>
    <textarea id="l5"></textarea>

    <br>
    <button onclick="checkLogic()">チェック</button>
    <button onclick="clearAll()">クリア</button>
    <button onclick="sample()">サンプル</button>
  </div>

  <div class="output">
    <h3>結果</h3>
    <div id="results"></div>
  </div>

</div>

<script>
function simpleJudge(prev, curr, index) {
  if (index === 0) return "問題なし";

  if (!curr.trim()) return "飛躍";

  const prevWords = prev.split(/[\s、。]/);
  const currWords = curr.split(/[\s、。]/);

  let overlap = prevWords.filter(w => currWords.includes(w) && w.length > 1);

  if (overlap.length > 0) {
    return "問題なし";
  } else {
    return "飛躍";
  }
}

function checkLogic() {
  const lines = [
    document.getElementById("l1").value,
    document.getElementById("l2").value,
    document.getElementById("l3").value,
    document.getElementById("l4").value,
    document.getElementById("l5").value
  ];

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  for (let i = 0; i < lines.length; i++) {
    const label = simpleJudge(lines[i-1] || "", lines[i], i);

    const div = document.createElement("div");
    div.className = "result";

    if (label === "問題なし") {
      div.innerHTML = `${i+1}行目: <span class="ok">${label}</span>`;
    } else {
      div.innerHTML = `${i+1}行目: <span class="bad">${label}</span>`;
    }

    resultsDiv.appendChild(div);
  }
}

function clearAll() {
  for (let i = 1; i <= 5; i++) {
    document.getElementById("l" + i).value = "";
  }
  document.getElementById("results").innerHTML = "";
}

function sample() {
  document.getElementById("l1").value = "音声表現には言語情報とパラ言語情報が含まれる";
  document.getElementById("l2").value = "これらを分離することが重要である";
  document.getElementById("l3").value = "FiLMを用いて統合的に処理する";
  document.getElementById("l4").value = "実験で性能が向上した";
  document.getElementById("l5").value = "提案手法は有効である";
}
</script>

</body>
</html>
