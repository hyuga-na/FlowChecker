<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowChecker Fractal</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;

      --ok-bg: #ecfdf5;
      --ok-text: #065f46;

      --jump-bg: #fff7ed;
      --jump-text: #9a3412;

      --lack-bg: #eff6ff;
      --lack-text: #1d4ed8;

      --undef-bg: #f5f3ff;
      --undef-text: #6d28d9;

      --over-bg: #fef2f2;
      --over-text: #991b1b;

      --wait-bg: #f3f4f6;
      --wait-text: #374151;

      --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.6;
    }

    .notice {
      background: #fff7ed;
      color: #9a3412;
      border: 1px solid #fdba74;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 20px;
      line-height: 1.6;
      font-size: 14px;
    }

    .status-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: white;
      border: 1px solid var(--border);
      font-size: 14px;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #9ca3af;
    }

    .dot.ready { background: #10b981; }
    .dot.loading { background: #f59e0b; }
    .dot.error { background: #ef4444; }

    .top-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s ease;
    }

    button.primary {
      background: var(--accent);
      color: white;
    }

    button.secondary {
      background: #eef2ff;
      color: #3730a3;
    }

    button.ghost {
      background: #f3f4f6;
      color: #374151;
    }

    button.small {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 10px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .progress-wrap {
      margin-bottom: 24px;
    }

    .progress-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: #e5e7eb;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.2s ease;
    }

    .tree-root {
      display: grid;
      gap: 18px;
    }

    .block {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .block.depth-0 {
      border-left: 6px solid #2563eb;
    }

    .block.depth-1 {
      border-left: 6px solid #7c3aed;
      margin-left: 20px;
    }

    .block.depth-2 {
      border-left: 6px solid #059669;
      margin-left: 40px;
    }

    .block.depth-3,
    .block.depth-4,
    .block.depth-5 {
      border-left: 6px solid #ea580c;
      margin-left: 60px;
    }

    .block-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .block-title {
      font-weight: 700;
      font-size: 18px;
    }

    .block-meta {
      font-size: 13px;
      color: var(--muted);
    }

    .block-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .line-row {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
      background: #fff;
    }

    .line-row:last-child {
      margin-bottom: 0;
    }

    .line-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .line-label {
      font-weight: 700;
      font-size: 15px;
    }

    .line-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    textarea {
      width: 100%;
      min-height: 72px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      line-height: 1.6;
      background: #fff;
      color: var(--text);
    }

    textarea:focus {
      outline: none;
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
    }

    .child-wrap {
      margin-top: 12px;
    }

    .result-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .result-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .result-title {
      font-weight: 700;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.problem-none {
      background: var(--ok-bg);
      color: var(--ok-text);
    }

    .badge.jump {
      background: var(--jump-bg);
      color: var(--jump-text);
    }

    .badge.lack {
      background: var(--lack-bg);
      color: var(--lack-text);
    }

    .badge.undefined {
      background: var(--undef-bg);
      color: var(--undef-text);
    }

    .badge.excess {
      background: var(--over-bg);
      color: var(--over-text);
    }

    .badge.wait {
      background: var(--wait-bg);
      color: var(--wait-text);
    }

    .section-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin: 8px 0 4px;
    }

    .result-body,
    .reason,
    .meta {
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .meta {
      color: var(--muted);
    }

    .footer-note {
      margin-top: 18px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>FlowChecker Fractal</h1>
    <p class="subtitle">
      5行ロジックを再帰的に分解しながら記述し、各ブロックごとに論理接続を判定します。
    </p>

    <div class="notice">
      各行には詳細ブロックをぶら下げられます。親行は粗い粒度、子ブロックはその行の内訳を書く想定です。
    </div>

    <div class="status-bar">
      <div class="chip">
        <span id="model-dot" class="dot"></span>
        <span id="model-status">モデル未ロード</span>
      </div>
      <div class="chip">
        <span id="device-dot" class="dot"></span>
        <span id="device-status">推論デバイス未決定</span>
      </div>
      <div class="chip">
        <span id="progress-text">待機中</span>
      </div>
    </div>

    <div class="top-buttons">
      <button id="load-btn" class="secondary">モデルを読み込む</button>
      <button id="analyze-root-btn" class="primary" disabled>ルートブロックを判定</button>
      <button id="analyze-all-btn" class="primary" disabled>全ブロックを判定</button>
      <button id="clear-btn" class="ghost">全体をクリア</button>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">処理状況</div>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </div>

    <div id="tree-root" class="tree-root"></div>

    <div class="footer-note">
      各ブロックの判定は「背景→課題→解法→結果→考察」の接続で評価します。
      ある行の詳細を記述したい場合は、その行の「詳細を開く」を使ってください。
    </div>
  </div>

  <script type="module">
    import { pipeline } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.8.0";

    const MODEL_ID = "Xenova/mDeBERTa-v3-base-xnli-multilingual-nli-2mil7";
    const LINE_NAMES = ["背景", "課題", "解法", "結果", "考察"];
    const LABELS = ["問題なし", "飛躍", "不足", "未定義", "過剰"];

    let classifier = null;
    let selectedDevice = "wasm";
    let isLoading = false;
    let isChecking = false;
    let nodeCounter = 0;

    function createEmptyResults() {
      return [
        { label: "問題なし", reason: "1行目は比較対象がないため固定で問題なしです。", scoreText: "固定判定", relation: "比較対象なし" },
        { label: "未判定", reason: "まだ判定していません。", scoreText: "未判定", relation: "背景 → 課題" },
        { label: "未判定", reason: "まだ判定していません。", scoreText: "未判定", relation: "課題 → 解法" },
        { label: "未判定", reason: "まだ判定していません。", scoreText: "未判定", relation: "解法 → 結果" },
        { label: "未判定", reason: "まだ判定していません。", scoreText: "未判定", relation: "結果 → 考察" },
      ];
    }

    function createNode(depth = 0, title = "ルート") {
      return {
        id: `node-${++nodeCounter}`,
        depth,
        title,
        lines: ["", "", "", "", ""],
        children: [null, null, null, null, null],
        expanded: [false, false, false, false, false],
        results: createEmptyResults(),
      };
    }

    let tree = createNode(0, "ルート");

    const els = {
      loadBtn: document.getElementById("load-btn"),
      analyzeRootBtn: document.getElementById("analyze-root-btn"),
      analyzeAllBtn: document.getElementById("analyze-all-btn"),
      clearBtn: document.getElementById("clear-btn"),
      modelStatus: document.getElementById("model-status"),
      modelDot: document.getElementById("model-dot"),
      deviceStatus: document.getElementById("device-status"),
      deviceDot: document.getElementById("device-dot"),
      progressText: document.getElementById("progress-text"),
      progressFill: document.getElementById("progress-fill"),
      treeRoot: document.getElementById("tree-root"),
    };

    function supportsWebGPU() {
      return typeof navigator !== "undefined" && "gpu" in navigator;
    }

    function setModelState(state, text) {
      els.modelStatus.textContent = text;
      els.modelDot.className = "dot " + state;
    }

    function setDeviceState(state, text) {
      els.deviceStatus.textContent = text;
      els.deviceDot.className = "dot " + state;
    }

    function setProgress(text, percent = null) {
      els.progressText.textContent = text;
      if (percent === null || Number.isNaN(percent)) {
        els.progressFill.style.width = "0%";
      } else {
        const p = Math.max(0, Math.min(100, percent));
        els.progressFill.style.width = p + "%";
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function badgeClass(label) {
      switch (label) {
        case "問題なし": return "problem-none";
        case "飛躍": return "jump";
        case "不足": return "lack";
        case "未定義": return "undefined";
        case "過剰": return "excess";
        default: return "wait";
      }
    }

    function countNonEmptyLines(node) {
      return node.lines.filter(v => v.trim()).length;
    }

    function relationName(index) {
      if (index === 0) return "比較対象なし";
      return `${LINE_NAMES[index - 1]} → ${LINE_NAMES[index]}`;
    }

    function lineSpecificReason(label, prevRole, currRole, prevText, currText) {
      if (!prevText && currRole) {
        return `前の行が空欄のため、${currRole}への接続を評価できません。`;
      }
      if (!currText && currRole) {
        return `${currRole}が空欄のため、論理接続が成立していません。`;
      }

      const transition = `${prevRole}から${currRole}への接続`;

      switch (label) {
        case "問題なし":
          return `${transition}は自然です。直前の内容から次の主張が無理なく導かれています。`;
        case "飛躍":
          return `${transition}に中間説明が不足しています。前の行から次の主張へ移る論理の橋渡しが弱いです。`;
        case "不足":
          return `${currRole}を支えるための情報が${prevRole}に十分含まれていません。前提や条件の補足が必要です。`;
        case "未定義":
          return `${currRole}で使われている概念・対象・手法の一部が、それ以前の行で導入されていません。`;
        case "過剰":
          return `${currRole}の主張が${prevRole}に対して強すぎます。直前の内容からはそこまで言い切れません。`;
        default:
          return "判定中です。";
      }
    }

    function buildPrompt(prevLabel, currLabel, prevText, currText) {
      return [
        `前の行の役割: ${prevLabel}`,
        `次の行の役割: ${currLabel}`,
        `前の文: ${prevText}`,
        `次の文: ${currText}`,
        "",
        "前の行から次の行への研究ロジック上の接続を判定する。",
        "使用可能なラベルは次の5つのみ。",
        "問題なし: 自然につながっている。",
        "飛躍: 中間説明がなく、論理の橋渡しが弱い。",
        "不足: 次の行を支える前提情報が足りない。",
        "未定義: 次の行で使う概念や対象が未導入である。",
        "過剰: 次の行の主張が強すぎる。",
        "",
        "この接続に最も適切なラベルを1つ選ぶ。"
      ].join("\n");
    }

    function getHeuristicFeatures(prevText, currText) {
      const prev = prevText || "";
      const curr = currText || "";

      const feature = {
        overlap: 0,
        hasMethodWord: false,
        hasResultWord: false,
        hasDiscussionWord: false,
        hasAbstractRef: false,
        introducesNewTerms: false,
        strongClaim: false,
      };

      const splitWords = (text) =>
        text
          .split(/[\s、。，．。・()（）「」『』【】\[\],.!?！？:：;；/]+/)
          .map(s => s.trim())
          .filter(s => s.length >= 2);

      const prevWords = splitWords(prev);
      const currWords = splitWords(curr);

      const prevSet = new Set(prevWords);
      const currSet = new Set(currWords);

      let overlap = 0;
      for (const w of currSet) {
        if (prevSet.has(w)) overlap++;
      }
      feature.overlap = overlap;

      const methodWords = ["提案", "手法", "モデル", "学習", "推定", "分類", "生成", "FiLM", "手順", "設計"];
      const resultWords = ["結果", "性能", "向上", "改善", "精度", "有意", "実験", "評価", "達成"];
      const discussionWords = ["有効", "示唆", "考えられる", "可能性", "解釈", "意味", "有用"];
      const abstractRefs = ["これ", "それ", "この", "その", "両者", "提案手法", "本手法", "本研究"];
      const strongClaims = ["証明", "完全", "必ず", "明らか", "万能", "決定的", "全て", "十分である", "有効である"];

      feature.hasMethodWord = methodWords.some(w => curr.includes(w));
      feature.hasResultWord = resultWords.some(w => curr.includes(w));
      feature.hasDiscussionWord = discussionWords.some(w => curr.includes(w));
      feature.hasAbstractRef = abstractRefs.some(w => curr.includes(w));

      const newTerms = currWords.filter(w => !prevSet.has(w) && w.length >= 3);
      feature.introducesNewTerms = newTerms.length >= 2;

      feature.strongClaim = strongClaims.some(w => curr.includes(w));

      return feature;
    }

    function heuristicClassify(prevText, currText, prevIndex, currIndex) {
      if (currIndex === 0) {
        return { label: "問題なし", scoreText: "固定判定" };
      }
      if (!prevText && !currText) {
        return { label: "不足", scoreText: "両方空欄" };
      }
      if (!prevText) {
        return { label: "不足", scoreText: "前行空欄" };
      }
      if (!currText) {
        return { label: "不足", scoreText: "当該行空欄" };
      }

      const f = getHeuristicFeatures(prevText, currText);
      let label = "問題なし";

      if (currIndex === 1) {
        if (f.introducesNewTerms && !f.hasAbstractRef) label = "未定義";
        else if (f.strongClaim) label = "過剰";
        else if (f.overlap === 0) label = "飛躍";
      } else if (currIndex === 2) {
        if (f.introducesNewTerms && f.hasMethodWord && f.overlap === 0) label = "未定義";
        else if (f.overlap === 0) label = "飛躍";
        else if (!f.hasMethodWord) label = "不足";
      } else if (currIndex === 3) {
        if (f.strongClaim) label = "過剰";
        else if (!f.hasResultWord) label = "不足";
        else if (f.overlap === 0) label = "飛躍";
      } else if (currIndex === 4) {
        if (f.strongClaim) label = "過剰";
        else if (f.introducesNewTerms && !f.hasAbstractRef) label = "未定義";
        else if (!f.hasDiscussionWord && f.overlap === 0) label = "飛躍";
      }

      return {
        label,
        scoreText: `fallback: overlap=${f.overlap}, method=${f.hasMethodWord}, result=${f.hasResultWord}, discussion=${f.hasDiscussionWord}, newTerms=${f.introducesNewTerms}, strongClaim=${f.strongClaim}`
      };
    }

    async function classifyPair(prevIndex, currIndex, prevText, currText) {
      const relation = `${LINE_NAMES[prevIndex]} → ${LINE_NAMES[currIndex]}`;

      if (!prevText || !currText || !classifier) {
        const fallback = heuristicClassify(prevText, currText, prevIndex, currIndex);
        return {
          label: fallback.label,
          reason: lineSpecificReason(fallback.label, LINE_NAMES[prevIndex], LINE_NAMES[currIndex], prevText, currText),
          relation,
          scoreText: fallback.scoreText,
        };
      }

      const sequence = buildPrompt(
        LINE_NAMES[prevIndex],
        LINE_NAMES[currIndex],
        prevText,
        currText
      );

      try {
        const output = await classifier(sequence, LABELS, {
          multi_label: false,
          hypothesis_template: "この接続の判定は {}。"
        });

        const labels = Array.isArray(output.labels) ? output.labels : [];
        const scores = Array.isArray(output.scores) ? output.scores : [];
        const topLabel = labels[0] || "飛躍";
        const topScore = typeof scores[0] === "number" ? scores[0] : null;
        const safeLabel = LABELS.includes(topLabel) ? topLabel : "飛躍";

        return {
          label: safeLabel,
          reason: lineSpecificReason(safeLabel, LINE_NAMES[prevIndex], LINE_NAMES[currIndex], prevText, currText),
          relation,
          scoreText: topScore === null ? "model score unavailable" : `model score=${topScore.toFixed(3)}`,
        };
      } catch (e) {
        const fallback = heuristicClassify(prevText, currText, prevIndex, currIndex);
        return {
          label: fallback.label,
          reason: lineSpecificReason(fallback.label, LINE_NAMES[prevIndex], LINE_NAMES[currIndex], prevText, currText),
          relation,
          scoreText: `fallback after error: ${fallback.scoreText}`,
        };
      }
    }

    function resetNodeResults(node) {
      node.results = createEmptyResults();
      for (const child of node.children) {
        if (child) resetNodeResults(child);
      }
    }

    function findNodeById(node, id) {
      if (node.id === id) return node;
      for (const child of node.children) {
        if (!child) continue;
        const found = findNodeById(child, id);
        if (found) return found;
      }
      return null;
    }

    function renderNode(node) {
      const linesHtml = node.lines.map((line, i) => {
        const child = node.children[i];
        const hasChild = !!child;
        const isExpanded = !!node.expanded[i];
        const detailLabel = hasChild ? (isExpanded ? "詳細を閉じる" : "詳細を開く") : "詳細を作成";

        return `
          <div class="line-row">
            <div class="line-top">
              <div class="line-label">${i + 1}. ${LINE_NAMES[i]}</div>
              <div class="line-controls">
                <button class="ghost small" data-action="toggle-child" data-node-id="${node.id}" data-line-index="${i}" ${!line.trim() && !hasChild ? "disabled" : ""}>
                  ${escapeHtml(detailLabel)}
                </button>
                ${hasChild ? `
                  <button class="ghost small" data-action="remove-child" data-node-id="${node.id}" data-line-index="${i}">
                    詳細を削除
                  </button>
                ` : ""}
              </div>
            </div>

            <textarea data-action="edit-line" data-node-id="${node.id}" data-line-index="${i}">${escapeHtml(line)}</textarea>

            ${hasChild && isExpanded ? `
              <div class="child-wrap">
                ${renderNode(child)}
              </div>
            ` : ""}
          </div>
        `;
      }).join("");

      const resultsHtml = node.results.map((res, i) => {
        const prev = i === 0 ? "" : node.lines[i - 1];
        const curr = node.lines[i];
        return `
          <div class="result-card">
            <div class="result-head">
              <div class="result-title">${i + 1}行目（${LINE_NAMES[i]}）</div>
              <span class="badge ${badgeClass(res.label)}">${escapeHtml(res.label)}</span>
            </div>

            <div class="section-label">接続</div>
            <div class="result-body">${escapeHtml(res.relation || relationName(i))}</div>

            <div class="section-label">内容</div>
            <div class="result-body">${escapeHtml(
              i === 0
                ? `当該行: ${curr || "（未入力）"}`
                : `前: ${prev || "（未入力）"}\n次: ${curr || "（未入力）"}`
            )}</div>

            <div class="section-label">理由</div>
            <div class="reason">${escapeHtml(res.reason || "まだ判定していません。")}</div>

            <div class="section-label">補足</div>
            <div class="meta">${escapeHtml(res.scoreText || "未判定")}</div>
          </div>
        `;
      }).join("");

      return `
        <section class="block depth-${Math.min(node.depth, 5)}">
          <div class="block-header">
            <div>
              <div class="block-title">${escapeHtml(node.title)}</div>
              <div class="block-meta">深さ ${node.depth} / 入力済み ${countNonEmptyLines(node)} 行 / ID ${escapeHtml(node.id)}</div>
            </div>
            <div class="block-actions">
              <button class="secondary small" data-action="analyze-node" data-node-id="${node.id}" ${classifier ? "" : "disabled"}>
                このブロックを判定
              </button>
              ${node.depth > 0 ? `
                <button class="ghost small" data-action="collapse-all-children" data-node-id="${node.id}">
                  子をたたむ
                </button>
              ` : ""}
            </div>
          </div>

          ${linesHtml}

          <div class="result-list">
            ${resultsHtml}
          </div>
        </section>
      `;
    }

    function render() {
      els.treeRoot.innerHTML = renderNode(tree);
      els.analyzeRootBtn.disabled = !classifier;
      els.analyzeAllBtn.disabled = !classifier;
    }

    function ensureChild(node, lineIndex) {
      if (!node.children[lineIndex]) {
        node.children[lineIndex] = createNode(node.depth + 1, `${LINE_NAMES[lineIndex]} の詳細`);
      }
    }

    function collapseChildrenRecursively(node) {
      node.expanded = [false, false, false, false, false];
      for (const child of node.children) {
        if (child) collapseChildrenRecursively(child);
      }
    }

    async function analyzeNode(node) {
      node.results[0] = {
        label: "問題なし",
        reason: "1行目は比較対象がないため固定で問題なしです。",
        scoreText: "固定判定",
        relation: "比較対象なし",
      };

      for (let i = 1; i < 5; i++) {
        const result = await classifyPair(i - 1, i, node.lines[i - 1], node.lines[i]);
        node.results[i] = result;
      }
    }

    function collectNodes(node, list = []) {
      list.push(node);
      for (const child of node.children) {
        if (child) collectNodes(child, list);
      }
      return list;
    }

    async function analyzeAllNodes() {
      if (!classifier || isChecking) return;
      isChecking = true;
      els.analyzeAllBtn.disabled = true;
      els.analyzeRootBtn.disabled = true;
      els.loadBtn.disabled = true;

      const nodes = collectNodes(tree, []);
      for (let idx = 0; idx < nodes.length; idx++) {
        setProgress(`全体判定中... ${idx + 1}/${nodes.length}`, ((idx + 1) / nodes.length) * 100);
        await analyzeNode(nodes[idx]);
        render();
      }

      setProgress("全ブロックの判定完了", 100);
      els.analyzeAllBtn.disabled = false;
      els.analyzeRootBtn.disabled = false;
      els.loadBtn.disabled = false;
      isChecking = false;
    }

    async function analyzeSingleNode(nodeId) {
      if (!classifier || isChecking) return;
      const node = findNodeById(tree, nodeId);
      if (!node) return;

      isChecking = true;
      els.analyzeAllBtn.disabled = true;
      els.analyzeRootBtn.disabled = true;
      els.loadBtn.disabled = true;

      setProgress(`ブロック ${node.title} を判定中...`, null);
      await analyzeNode(node);
      render();

      setProgress("ブロック判定完了", 100);
      els.analyzeAllBtn.disabled = false;
      els.analyzeRootBtn.disabled = false;
      els.loadBtn.disabled = false;
      isChecking = false;
    }

    async function loadModel() {
      if (classifier || isLoading) return;

      isLoading = true;
      els.loadBtn.disabled = true;
      els.analyzeRootBtn.disabled = true;
      els.analyzeAllBtn.disabled = true;

      selectedDevice = supportsWebGPU() ? "webgpu" : "wasm";
      setDeviceState("loading", selectedDevice === "webgpu" ? "WebGPU を試行中" : "CPU (WASM) を使用");
      setModelState("loading", "モデル読込中");
      setProgress("モデルを読み込んでいます...", 0);

      try {
        classifier = await pipeline("zero-shot-classification", MODEL_ID, {
          device: selectedDevice,
          dtype: selectedDevice === "webgpu" ? "fp16" : "q8",
          progress_callback: (progress) => {
            if (!progress) return;
            const p = progress.progress ?? 0;
            const status = progress.status ?? "loading";
            setProgress(`読込中: ${status}`, p * 100);
          },
        });

        setModelState("ready", "モデル読込完了");
        setDeviceState("ready", selectedDevice === "webgpu" ? "WebGPU で実行" : "CPU (WASM) で実行");
        setProgress("準備完了", 100);
        els.analyzeRootBtn.disabled = false;
        els.analyzeAllBtn.disabled = false;
      } catch (e) {
        try {
          selectedDevice = "wasm";
          setDeviceState("loading", "CPU (WASM) に切替中");
          setProgress("CPU モードで再読込中...", 10);

          classifier = await pipeline("zero-shot-classification", MODEL_ID, {
            device: "wasm",
            dtype: "q8",
            progress_callback: (progress) => {
              if (!progress) return;
              const p = progress.progress ?? 0;
              const status = progress.status ?? "loading";
              setProgress(`読込中: ${status}`, p * 100);
            },
          });

          setModelState("ready", "モデル読込完了");
          setDeviceState("ready", "CPU (WASM) で実行");
          setProgress("準備完了", 100);
          els.analyzeRootBtn.disabled = false;
          els.analyzeAllBtn.disabled = false;
        } catch (err) {
          console.error(err);
          setModelState("error", "モデル読込失敗");
          setDeviceState("error", "推論デバイス初期化失敗");
          setProgress("読込に失敗しました", 0);
          alert("モデルの読み込みに失敗しました。通信環境かブラウザ設定を確認してください。");
        }
      } finally {
        isLoading = false;
        els.loadBtn.disabled = false;
        render();
      }
    }

    function clearAll() {
      tree = createNode(0, "ルート");
      resetNodeResults(tree);
      render();
      setProgress(classifier ? "準備完了" : "待機中", classifier ? 100 : 0);
    }

    els.treeRoot.addEventListener("input", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLTextAreaElement)) return;
      const action = target.dataset.action;
      if (action !== "edit-line") return;

      const nodeId = target.dataset.nodeId;
      const lineIndex = Number(target.dataset.lineIndex);
      const node = findNodeById(tree, nodeId);
      if (!node || Number.isNaN(lineIndex)) return;

      node.lines[lineIndex] = target.value;

      if (target.value.trim()) {
        ensureChild(node, lineIndex);
      }

      render();
    });

    els.treeRoot.addEventListener("click", async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;

      const button = target.closest("button");
      if (!button) return;

      const action = button.dataset.action;
      const nodeId = button.dataset.nodeId;
      const lineIndex = Number(button.dataset.lineIndex);
      const node = nodeId ? findNodeById(tree, nodeId) : null;

      if (action === "toggle-child") {
        if (!node || Number.isNaN(lineIndex)) return;
        if (!node.children[lineIndex] && node.lines[lineIndex].trim()) {
          ensureChild(node, lineIndex);
        }
        if (node.children[lineIndex]) {
          node.expanded[lineIndex] = !node.expanded[lineIndex];
          render();
        }
        return;
      }

      if (action === "remove-child") {
        if (!node || Number.isNaN(lineIndex)) return;
        node.children[lineIndex] = null;
        node.expanded[lineIndex] = false;
        render();
        return;
      }

      if (action === "analyze-node") {
        if (!node) return;
        await analyzeSingleNode(node.id);
        return;
      }

      if (action === "collapse-all-children") {
        if (!node) return;
        collapseChildrenRecursively(node);
        render();
      }
    });

    els.loadBtn.addEventListener("click", loadModel);
    els.analyzeRootBtn.addEventListener("click", async () => {
      await analyzeSingleNode(tree.id);
    });
    els.analyzeAllBtn.addEventListener("click", analyzeAllNodes);
    els.clearBtn.addEventListener("click", clearAll);

    if (supportsWebGPU()) {
      setDeviceState("ready", "WebGPU 利用可能");
    } else {
      setDeviceState("ready", "WebGPU 非対応 / CPU (WASM) 想定");
    }
    setModelState("ready", "未ロード");
    setProgress("待機中", 0);

    render();
  </script>
</body>
</html>
